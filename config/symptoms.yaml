    layers:
      L1_clinical: |
        DSM-5-TR Criterion HI-c (extended): Difficulty with behavioral inhibition and task termination.
        Adults show impaired stop-signal processing, manifesting as an inability to disengage from
        a current activity even when aware of competing priorities.
      L2_adult: |
        Hyperfocusing on a project for hours past the intended stopping point, missing meals or appointments.
        Difficulty transitioning between tasks, especially from an engaging to a mundane activity.
        Being late because "one more thing" always takes priority over leaving on time.
        Video games, social media, or hobbies consume entire evenings unintentionally.
      L3_discussion: |
        "I meant to play the game for 30 minutes and suddenly it's 3 AM."
        "I can't leave the house on time because I always have to do 'one more thing.'"
        "My hyperfocus is a superpower and a curse."
        "Transitions are the hardest part of my day."
      L4_differential: |
        OCD: inability to stop is driven by anxiety and compulsive rituals, not by engagement or reward.
        Behavioral addiction: difficulty stopping is confined to specific reward-driven activities.
        ADHD-specific: difficulty stopping generalizes across activities and is tied to attentional perseveration, not compulsion or craving.

  # ---------------------------------------------------------------------------
  # Factor: Verbal H/I (F_VH) -- Subcluster: Output Control
  # ---------------------------------------------------------------------------
  - item_number: 15
    text: "How often do you talk too much when in social situations?"
    factor: "Verbal_HI"
    subcluster: "Output_Control"
    token_budget: "minimal_2"
    expected_reliability: "HIGH"
    symptom_weight: 0.9
    clinical_difficulty_prior: 0.2
    keywords:
      - "talk too much"
      - "rambling"
      - "oversharing"
      - "motor mouth"
      - "can't stop talking"
      - "dominating conversation"
      - "interrupt"
      - "talk too much"
      - "blurt out"
      - "can't wait my turn"
      - "finish sentences"
      - "butting in"
      - "rambling"
      - "oversharing"
    layers:
      L1_clinical: |
        DSM-5-TR Criterion HI-d: Often talks excessively.
        In adults, verbal hyperactivity presents as difficulty self-monitoring conversational
        output, leading to socially inappropriate over-disclosure and monologuing.
      L2_adult: |
        Dominating conversations without realizing until afterward.
        Sharing personal details inappropriately or at excessive length.
        Difficulty reading social cues that the listener wants to speak or leave.
      L3_discussion: |
        "I always realize I've been talking for 10 minutes straight and no one else got a word in."
        "I overshare with strangers and then feel mortified later."
        "My friends joke that I don't have a filter."
      L4_differential: |
        Mania: pressured speech is episodic, rapid, and accompanied by elevated or irritable mood.
        Social anxiety: the person typically under-talks, not over-talks, in social settings.
        ADHD-specific: excessive talking is chronic, often topic-driven by enthusiasm, and the person is distressed by it retrospectively.

  - item_number: 16
    text: "When you're in a conversation, how often do you find yourself finishing the sentences of the people you are talking to, before they can finish them themselves?"
    factor: "Verbal_HI"
    subcluster: "Output_Control"
    token_budget: "minimal_2"
    expected_reliability: "HIGH"
    symptom_weight: 0.9
    clinical_difficulty_prior: 0.2
    keywords:
      - "finishing sentences"
      - "completing others' thoughts"
      - "jumping ahead"
      - "impatient listener"
      - "anticipating words"
      - "interrupt"
      - "talk too much"
      - "blurt out"
      - "can't wait my turn"
      - "finish sentences"
      - "butting in"
      - "rambling"
      - "oversharing"
    layers:
      L1_clinical: |
        DSM-5-TR Criterion HI-f: Often finishes others' sentences.
        This reflects impaired verbal inhibition combined with rapid cognitive processing;
        the person anticipates the speaker's point and verbalizes it prematurely.
      L2_adult: |
        Completing colleagues' sentences in meetings, perceived as condescending.
        Jumping to conclusions about what someone is saying before they finish.
        Partners feel unheard because their thoughts are "stolen" mid-sentence.
      L3_discussion: |
        "I finish people's sentences and they think I'm being rude but I just can't help it."
        "My brain gets there before they do and the words just come out."
        "I've been told I'm a terrible listener because of this."
      L4_differential: |
        Impatience from anxiety: finishing sentences is driven by wanting the conversation to end, not by cognitive impulsivity.
        Narcissistic traits: interrupting is self-serving and dismissive; in ADHD it is often collaborative in intent.
        ADHD-specific: the person is genuinely trying to help or connect, feels remorseful afterward, and cannot suppress the behavior despite awareness.

  # ---------------------------------------------------------------------------
  # Factor: Verbal H/I (F_VH) -- Subcluster: Turn-Taking/Interrupting
  # ---------------------------------------------------------------------------
  - item_number: 17
    text: "How often do you have difficulty waiting your turn?"
    factor: "Verbal_HI"
    subcluster: "Turn_Taking"
    token_budget: "minimal_2"
    expected_reliability: "MEDIUM"
    symptom_weight: 0.9
    clinical_difficulty_prior: 0.2
    keywords:
      - "waiting turn"
      - "impatient"
      - "lines"
      - "queues"
      - "can't wait"
      - "cutting in"
      - "frustrated waiting"
      - "interrupt"
      - "talk too much"
      - "blurt out"
      - "can't wait my turn"
      - "finish sentences"
      - "butting in"
      - "rambling"
      - "oversharing"
    layers:
      L1_clinical: |
        DSM-5-TR Criterion HI-h: Often has difficulty waiting their turn.
        In adults, this extends beyond physical queues to cognitive and social turn-taking,
        reflecting core deficits in delay aversion and temporal discounting.
      L2_adult: |
        Intense frustration in lines, traffic, or waiting rooms disproportionate to the actual wait.
        Choosing faster but more expensive or less optimal options to avoid waiting.
        Difficulty waiting for others to finish speaking before responding in group discussions.
        Online ordering, self-checkout, and express lanes preferentially used.
      L3_discussion: |
        "Waiting in line makes me feel like I'm going to crawl out of my skin."
        "I will pay extra just to skip a queue."
        "I know I should wait my turn to talk but the thought will vanish if I don't say it now."
        "Traffic makes me irrationally angry."
      L4_differential: |
        Antisocial traits: queue-cutting is entitled and without remorse; in ADHD there is awareness and guilt.
        Impulse control disorders: difficulty waiting is confined to specific reward contexts.
        ADHD-specific: difficulty waiting is pervasive across contexts and accompanied by subjective distress, not entitlement.

  - item_number: 18
    text: "How often do you interrupt others when they are busy?"
    factor: "Verbal_HI"
    subcluster: "Turn_Taking"
    token_budget: "minimal_2"
    expected_reliability: "HIGH"
    symptom_weight: 0.9
    clinical_difficulty_prior: 0.2
    keywords:
      - "interrupt"
      - "butting in"
      - "barging in"
      - "can't hold thought"
      - "blurting"
      - "intruding"
      - "urgent feeling"
      - "interrupt"
      - "talk too much"
      - "blurt out"
      - "can't wait my turn"
      - "finish sentences"
      - "butting in"
      - "rambling"
      - "oversharing"
    layers:
      L1_clinical: |
        DSM-5-TR Criterion HI-g: Often interrupts or intrudes on others.
        Adults interrupt conversations, meetings, or others' work because the thought feels
        urgent and transient -- if not expressed immediately, it will be lost.
      L2_adult: |
        Walking into a colleague's office mid-task to share a thought that "can't wait."
        Interrupting meetings with tangential ideas that derail the agenda.
        Sending messages marked urgent for non-urgent matters.
      L3_discussion: |
        "I interrupt because if I don't say it right now, I'll forget it completely."
        "People think I'm rude but I'm just terrified of losing the thought."
        "I've started writing things down instead of interrupting but I still slip up."
      L4_differential: |
        Narcissistic traits: interrupting reflects a belief that one's input is more important; lacks remorse.
        Mania: interrupting is accompanied by pressured speech, flight of ideas, and elevated mood.
        ADHD-specific: interrupting is driven by working memory limitations and thought urgency, not self-importance; the person is typically apologetic.

