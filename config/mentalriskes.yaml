# MentalRiskES 2026 Task 1 Configuration
# =============================================

server:
  base_url_env: "MENTALRISKES_SERVER_URL"      # env var for server URL
  token_env: "MENTALRISKES_TOKEN"              # env var for auth token
  user_env: "MENTALRISKES_USER"                # env var for user name
  use_trial: false                             # true = trial endpoints, false = test
  retries: 5
  backoff: 0.1

llm:
  # --- Option A: DeepInfra (default — streaming SSE, OpenAI-compatible) ---
  provider: "deepinfra"
  api_key_env: "DEEPINFRA_API_KEY"
  base_url_env: ""                             # default https://api.deepinfra.com/v1/openai
  model: "meta-llama/Llama-3.3-70B-Instruct"

  # --- Option B: Local Ollama (GPU required) ---
  # provider: "ollama"
  # base_url_env: "OLLAMA_BASE_URL"            # e.g. http://localhost:11434
  # api_key_env: "OLLAMA_API_KEY"
  # model: "llama3.3:70b"

  # --- Option C: TogetherAI ---
  # provider: "together"
  # api_key_env: "TOGETHER_API_KEY"
  # base_url_env: "TOGETHER_BASE_URL"
  # model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"

  # --- Option D: HuggingFace Inference API (serverless) ---
  # provider: "huggingface"
  # api_key_env: "HF_TOKEN"
  # model: "meta-llama/Llama-3.3-70B-Instruct"

  temperature: 0.1
  max_tokens: 8192                             # CompACT-10 CoT needs ~5-6K output tokens
  timeout: 180

data:
  trial_dir: "data/MentalRiskES-2026/task1_trial/data"
  primate_path: "data/MentalRiskES-2026/primate_dataset.json"
  output_dir: "output/mentalriskes"
  checkpoint_dir: "output/mentalriskes/checkpoints"
  log_dir: "output/mentalriskes/logs"

# Resources
resources:
  calibration_config: "specs/MentalRiskES/calibration_config.json"
  act_vocabulary: "specs/MentalRiskES/act_vocabulary_es.json"
  hexaflex_quotes: "specs/MentalRiskES/hexaflex_quotes_fallback.json"
  assessor_prompts: "specs/MentalRiskES/assessor_prompts_v2.py"

# Run configurations (3 official runs — calibration ablation staircase A5/A3/A1)
# Spec: mentalriskes2026_constraints_ablation_spec.md section 4.3
# Run 0 (A5) vs Run 1 (A3): measures LLM agent contribution over rule-based
# Run 1 (A3) vs Run 2 (A1): measures rule-based contribution over prompt anchors
# Run 0 (A5) vs Run 2 (A1): measures full calibration stack value
runs:
  - name: "run0_A5"
    description: "A5-T3: full stack — anchors + Level B + Level C + stability-adaptive aggregation."
    model: "meta-llama/Llama-3.3-70B-Instruct"
    prompt_language: "english"
    few_shot: true
    calibration: "none"           # simple correction disabled; Level B/C handle calibration
    calibration_params: {}
    prompt_anchors: true          # Level A: inject psychometric anchors
    level_b: true                 # Level B: 7-rule constraint system (C1–C7)
    level_c: true                 # Level C: LLM calibration agent
    # Temporal aggregation: T3 for CompACT-10, T2 for PHQ-9/GAD-7
    temporal_phq9: "T2"           # early-weighted (past-two-weeks constant)
    temporal_gad7: "T2"           # early-weighted (past-two-weeks constant)
    temporal_compact10: "T3"      # stability-adaptive (may evolve within session)
    temporal_decay: "step"        # first 5 rounds doubled
    temporal_discard_anomalous: true

  - name: "run1_A3"
    description: "A3-T2: safety hedge — anchors + Level B + early-weighted aggregation."
    model: "meta-llama/Llama-3.3-70B-Instruct"
    prompt_language: "english"
    few_shot: true
    calibration: "none"
    calibration_params: {}
    prompt_anchors: true          # Level A
    level_b: true                 # Level B
    level_c: false                # no Level C agent
    # Temporal aggregation: T2 for all instruments
    temporal_phq9: "T2"
    temporal_gad7: "T2"
    temporal_compact10: "T2"
    temporal_decay: "step"
    temporal_discard_anomalous: true

  - name: "run2_A1"
    description: "A1-T2: minimal post-hoc — anchors + early-weighted aggregation only."
    model: "meta-llama/Llama-3.3-70B-Instruct"
    prompt_language: "english"
    few_shot: true
    calibration: "none"
    calibration_params: {}
    prompt_anchors: true          # Level A only
    level_b: false
    level_c: false
    # Temporal aggregation: T2 for all instruments
    temporal_phq9: "T2"
    temporal_gad7: "T2"
    temporal_compact10: "T2"
    temporal_decay: "step"
    temporal_discard_anomalous: true

# Simulation LLM (for data_prep simulator — higher temperature, shorter output)
simulation_llm:
  provider: "openai"                             # TogetherAI is OpenAI-compatible
  base_url_env: "TOGETHER_BASE_URL"
  api_key_env: "TOGETHER_API_KEY"
  model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  temperature: 0.7
  max_tokens: 512
  timeout: 60

# Pipeline settings
pipeline:
  log_level: "INFO"
  log_llm_outputs: true                        # save raw LLM outputs
  parallel_assessment: false                    # assess instruments in parallel
  codecarbon:
    enabled: true
    country_iso_code: "FRA"
