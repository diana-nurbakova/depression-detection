# MentalRiskES 2026 Task 2: Therapist Response Selection
# Configuration file — updated 2026-04-01 after ablation study

llm:
  provider: together
  # Resolved from env vars TOGETHER_BASE_URL / TOGETHER_API_KEY
  model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  temperature: 0.1
  max_tokens: 4096
  timeout: 300

data:
  trial_dir: "data/MentalRiskES-2026/task2_trial/data"
  output_dir: "output/mentalriskes_task2"

server:
  base_url: "http://s3-ceatic.ujaen.es:8036"
  # token resolved from MENTALRISKES_TOKEN env var
  use_trial: false
  retries: 5
  backoff: 0.1

# Ablation settings (for reference)
ablation:
  local_model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  api_model: "claude-sonnet-4-20250514"

# Default run config (used by 'trial' command without --run)
default_run:
  model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  framing: "FUNC"
  pipeline: "B+"
  lang: "es"
  lookback_window: 3

# ============================================================
# 3 Submission Runs (finalized from ablation study)
# ============================================================
runs:
  # Run 0: Pure functional baseline with characterization
  # Best accuracy (55.6%), kappa 0.345
  run0:
    model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
    framing: "FUNC"
    pipeline: "B+"
    lang: "es"
    lookback_window: 3

  # Run 1: Same accuracy, highest kappa (0.351), framing diversity
  # Makes different per-round errors than Run 0
  run1:
    model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
    framing: "HYB"
    pipeline: "B+"
    lang: "es"
    lookback_window: 3

  # Run 2: Structural fallback (2-step pipeline)
  # If B+'s characterization overfits to trial style, the simpler pipeline hedges
  run2:
    model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
    framing: "FUNC"
    pipeline: "B"
    lang: "es"
    lookback_window: 3
