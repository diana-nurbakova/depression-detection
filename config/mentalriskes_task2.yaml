# MentalRiskES 2026 Task 2: Therapist Response Selection
# Configuration file — updated 2026-04-01 after ablation study

llm:
  provider: deepinfra
  api_key_env: "DEEPINFRA_API_KEY"
  # base_url defaults to https://api.deepinfra.com/v1/openai
  model: "meta-llama/Llama-3.3-70B-Instruct"
  temperature: 0.1
  max_tokens: 4096
  timeout: 300

data:
  trial_dir: "data/MentalRiskES-2026/task2_trial/data"
  simulated_dir: "output/mentalriskes/data_prep/simulated/task2"
  output_dir: "output/mentalriskes_task2"

server:
  base_url: "http://s3-ceatic.ujaen.es:8036"
  # token resolved from MENTALRISKES_TOKEN env var
  use_trial: false
  retries: 5
  backoff: 0.1

# Ablation settings (for reference)
ablation:
  local_model: "meta-llama/Llama-3.3-70B-Instruct"
  api_model: "claude-sonnet-4-20250514"

# Default run config (used by 'trial' command without --run)
default_run:
  model: "meta-llama/Llama-3.3-70B-Instruct"
  framing: "FUNC"
  pipeline: "B+"
  lang: "es"
  lookback_window: 3

# ============================================================
# 3 Submission Runs (finalized from v2.0 ablation, Apr 2026)
# ============================================================
runs:
  # Run 0: Permutation voting — best on simulated (94.3%, κ=0.914)
  run0:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    framing: "FUNC"
    pipeline: "B"
    lang: "es"
    lookback_window: 3
    permutation_voting: true

  # Run 1: Fixed order baseline — most robust across trial+sim (50%/92%)
  run1:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    framing: "FUNC"
    pipeline: "B"
    lang: "es"
    lookback_window: 3

  # Run 2: B+ with HYB framing — structural + framing diversity
  run2:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    framing: "HYB"
    pipeline: "B+"
    lang: "es"
    lookback_window: 3
