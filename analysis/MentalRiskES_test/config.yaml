# MentalRiskES 2026 — Test Set Analysis Configuration
# Paths, constants, and labels used across all analysis scripts.

paths:
  test_data_root: data/MentalRiskES-2026/test
  task1_data_dir: data/MentalRiskES-2026/test/task1/test/data
  task1_gold: data/MentalRiskES-2026/test/task1/test/gold_label.json
  task2_data_dir: data/MentalRiskES-2026/test/task2/test/data
  task2_gold_dir: data/MentalRiskES-2026/test/task2/test/gold

  task1_predictions_dir: output/mentalriskes/predictions
  task2_predictions_dir: output/mentalriskes_task2/server_submissions

  leaderboard_xlsx: data/MentalRiskES-2026/MentalRiskES2026 - Results.xlsx

  output_dir: analysis/MentalRiskES_test/outputs

team:
  name: INSALyon
  runs:
    - {idx: 0, label: "Run 0 (A5-T3 primary)"}
    - {idx: 1, label: "Run 1 (A3-T2 comparison)"}
    - {idx: 2, label: "Run 2 (A1 lightweight)"}

instruments:
  PHQ-9:
    n_items: 9
    band_cutoffs: [[0, 4, "minimal"], [5, 9, "mild"], [10, 14, "moderate"], [15, 19, "moderately_severe"], [20, 27, "severe"]]
    mcid: 5
    sem: 2.5
    treatment_threshold: 10
    item_labels:
      - "1. Anhedonia"
      - "2. Depressed mood"
      - "3. Sleep disturbance"
      - "4. Fatigue"
      - "5. Appetite"
      - "6. Worthlessness"
      - "7. Concentration"
      - "8. Psychomotor"
      - "9. Suicidal ideation"
  GAD-7:
    n_items: 7
    band_cutoffs: [[0, 4, "minimal"], [5, 9, "mild"], [10, 14, "moderate"], [15, 21, "severe"]]
    mcid: 4
    sem: 2.0
    red_flag: 15
    item_labels:
      - "1. Nervousness"
      - "2. Uncontrollable worry"
      - "3. Excessive worry"
      - "4. Trouble relaxing"
      - "5. Restlessness"
      - "6. Irritability"
      - "7. Fear"
  CompACT-10:
    n_items: 10
    band_cutoffs: []  # No standard bands
    mcid: 5  # provisional
    subscales:
      OE: [2, 4, 7]   # Openness to Experience: items 3, 5, 8 (1-based)
      BA: [0, 5, 8]   # Behavioural Awareness: items 1, 6, 9
      VA: [1, 3, 6, 9]  # Valued Action: items 2, 4, 7, 10

# Patients with gold labels but absent from local test data
expected_missing_patients_in_test: [S02, S08, S10, S11, S13, S14, S17]
